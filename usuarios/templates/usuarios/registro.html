{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="{% static 'css/bunker.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cuenta | El Mensaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5" style="max-width: 500px;">
    <div class="card shadow">
        <div class="card-header text-center py-3">
            <h3 class="h5 mb-0">Crear Cuenta Nueva</h3>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                {% if error %}
                <div class="alert alert-danger p-2 small fw-bold">{{ error }}</div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">DNI (Identificación Estatal)</label>
                    <input type="text" name="dni" class="form-control" required placeholder="Ej: 12345678">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" required placeholder="juan@email.com">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Establecer Contraseña de Acceso</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Registrarse y Continuar</button>
                
                <a href="{% url 'index' %}" class="btn btn-outline-secondary w-100">Volver al Inicio</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
