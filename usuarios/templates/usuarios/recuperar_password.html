{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="{% static 'css/bunker.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5" style="max-width: 480px;">
    <div class="card p-4 shadow">
        <h1 class="h4 mb-3">Recuperar Acceso</h1>
        <p class="text-muted small mb-4">Para restablecer tus credenciales de ingreso, validá tu DNI registrado y te enviaremos un código de validación por correo electrónico.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label for="dni" class="form-label fw-bold">Ingresá tu DNI</label>
                <input type="text" id="dni" name="dni" class="form-control" required placeholder="Ej: 12345678">
            </div>
            <button type="submit" class="btn btn-primary w-100">Solicitar Código de Restablecimiento</button>
        </form>
        <hr class="my-4">
        <div class="text-center">
            <a href="{% url 'login' %}" class="text-secondary small text-decoration-none">Volver a Iniciar Sesión</a>
        </div>
    </div>
</div>
</body>
</html>
