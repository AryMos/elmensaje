{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="{% static 'css/bunker.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - El Mensaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5" style="max-width: 480px;">
    <div class="card p-4 shadow">

        <h1 class="h3 text-center mb-3">Iniciar Sesión</h1>
        <p class="text-center text-muted small mb-4">Ingresá tus credenciales de acceso corporativo para gestionar la custodia.</p>

        {% if messages %}
            <div class="alert alert-danger p-2 mb-3 small" role="alert">
                {% for message in messages %}
                    <p class="mb-0 fw-bold">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="dni" class="form-label fw-bold">Número de DNI</label>
                <input type="text" id="dni" name="dni" class="form-control" required placeholder="Ej: 12345678">
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg">
                Ingresar al Sistema
            </button>
        </form>

        <hr class="my-4">
        
        <div class="text-center small">
            <p class="mb-2">
                <a href="{% url 'recuperar_password' %}" class="text-primary text-decoration-none fw-bold">¿Olvidaste tu contraseña?</a>
            </p>
            <p class="mb-0">
                <a href="{% url 'index' %}" class="text-secondary text-decoration-none">Volver al Inicio</a>
            </p>
        </div>

    </div>
</div>
</body>
</html>
